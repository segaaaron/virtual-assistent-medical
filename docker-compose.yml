# Infra local para desarrollo (postgres + redis). En prod se usa la DB/redis del VPS.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: loreley
    ports: ["5432:5432"]
    volumes: ["loreley_pg:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

volumes:
  loreley_pg:
